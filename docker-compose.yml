version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend

    ports:
      - "5000:5000"

    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend

    ports:
      - "8080:80"

    depends_on:
      - backend

  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"
