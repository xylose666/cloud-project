name: CI/CD Pipeline
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build and Push Image
        run: |
          ls -R
          IMAGE_TAG=${{ github.sha }}
          # 登录华为云 SWR
          echo ${{ secrets.SWR_PWD }} | docker login -u ${{ secrets.SWR_USER }} --password-stdin swr.cn-north-4.myhuaweicloud.com
          # 构建镜像
          docker build -t swr.cn-north-4.myhuaweicloud.com/cloud2576/backend:$IMAGE_TAG ./backend
          # 推送镜像
          docker push swr.cn-north-4.myhuaweicloud.com/cloud2576/backend:$IMAGE_TAG

      - name: Deploy to K8s
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.K8S_HOST }}
          username: ${{ secrets.K8S_USER }}
          password: ${{ secrets.K8S_PASSWORD }}
          script: |
            # 1. 强制在内存中创建一个干净的配置文件，不依赖物理文件
            mkdir -p ~/.kube
            echo "${{ secrets.KUBE_CONFIG_DATA }}" > ~/.kube/config
            chmod 600 ~/.kube/config
            
            # 2. 先调试：看看集群到底有哪些 deployment，避免再次出现 NotFound
            echo "--- Debug: Listing all deployments ---"
            kubectl get deployments -A
            
            # 3. 部署：确保名字和 namespace 与上面列出的完全一致
            echo "--- Deploying ---"
            kubectl set image deployment/<你的Deployment名称> <容器名称>=swr.cn-north-4.myhuaweicloud.com/cloud2576/backend:${{ github.sha }} -n <命名空间>
